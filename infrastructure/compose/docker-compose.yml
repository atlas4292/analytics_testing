version: '3.8'

services:
  # MinIO S3-Compatible Object Storage
  minio-storage:
    build:
      context: ..
      dockerfile: docker/Dockerfile.minion
    container_name: minio-storage
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_CONSOLE_ADDRESS: ":9001"
    ports:
      - "9000:9000"  # MinIO API port
      - "9001:9001"  # MinIO Console UI port
    volumes:
      - minio_data:/data
      - minio_config:/root/.minio
    networks:
      - storage-network
    command: ["minio", "server", "/data", "--console-address", ":9001"]

  # MinIO Client (mc) for bucket setup and management
  minio-client:
    image: minio/mc:latest
    container_name: minio-client
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - ./minio-setup.sh:/setup.sh:ro
    networks:
      - storage-network
    depends_on:
      - minio-storage
    profiles:
      - setup
    entrypoint: ["/bin/sh", "/setup.sh"]

  # Optional: Create a second MinIO instance for replication
  minio-replica:
    build:
      context: ..
      dockerfile: docker/Dockerfile.minion
    container_name: minio-replica
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_CONSOLE_ADDRESS: ":9002"
    ports:
      - "9010:9000"  # MinIO API port (replica)
      - "9002:9002"  # MinIO Console UI port (replica)
    volumes:
      - minio_replica_data:/data
      - minio_replica_config:/root/.minio
    networks:
      - storage-network
    command: ["minio", "server", "/data", "--console-address", ":9002"]
    profiles:
      - replica

  # Nessie - Data Catalog using MinIO for storage
  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    restart: unless-stopped
    ports:
      - "19120:19120"  # Nessie REST API port
    environment:
      # Nessie configuration using MinIO S3-compatible storage
      quarkus.log.level: INFO
      nessie.version.store.type: JDBC
      # Database configuration (using in-memory H2 for simplicity)
      quarkus.datasource.jdbc.url: jdbc:h2:mem:nessie;DB_CLOSE_DELAY=-1
      quarkus.datasource.username: nessie
      quarkus.datasource.password: nessie
      # S3 storage configuration for MinIO
      nessie.version.store.persist.s3.default-options.endpoint: http://minio-storage:9000
      nessie.version.store.persist.s3.default-options.region: us-east-1
      nessie.version.store.persist.s3.default-options.path-style-access: true
      nessie.version.store.persist.s3.default-options.access-key-id: minioadmin
      nessie.version.store.persist.s3.default-options.secret-access-key: minioadmin123
      nessie.version.store.persist.s3.bucket: nessie-catalog
      nessie.version.store.persist.s3.request.signer-override: S3V4SignerType
    depends_on:
      - minio-storage
    networks:
      - storage-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  minio_data:
  minio_config:
  minio_replica_data:
  minio_replica_config:

networks:
  storage-network:
    driver: bridge
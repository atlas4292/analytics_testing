# --- Iceberg + Nessie Catalog ---
spark.sql.extensions                       org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.nessie                   org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl      org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri               http://nessie:19120/api/v1
spark.sql.catalog.nessie.ref               main
spark.sql.catalog.nessie.io-impl           org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.nessie.s3.endpoint       http://minio-storage:9000
spark.sql.catalog.nessie.s3.path-style-access true
spark.sql.catalog.nessie.warehouse         s3a://analytics-data/warehouse
spark.sql.defaultCatalog                   nessie

# --- S3A / MinIO ---
spark.hadoop.fs.s3a.endpoint               http://minio-storage:9000
spark.hadoop.fs.s3a.access.key             minioadmin
spark.hadoop.fs.s3a.secret.key             minioadmin123
spark.hadoop.fs.s3a.path.style.access      true
spark.hadoop.fs.s3a.impl                   org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled false

# --- Warehouse ---
spark.sql.warehouse.dir                    s3a://analytics-data/warehouse

# --- Resource defaults (tune as needed) ---
spark.driver.memory                        1g
spark.executor.memory                      1g

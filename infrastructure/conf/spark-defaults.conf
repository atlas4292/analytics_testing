# --- Iceberg + Hive Metastore ---
spark.sql.extensions                       org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog            org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type       hive
spark.sql.catalog.iceberg                  org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type             hive
spark.sql.catalog.iceberg.uri              thrift://management:9083
spark.sql.catalog.iceberg.io-impl          org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.iceberg.s3.endpoint      http://minio-storage:9000
spark.sql.catalog.iceberg.s3.path-style-access true
spark.sql.catalog.iceberg.warehouse        s3a://analytics-data/warehouse
spark.sql.defaultCatalog                   iceberg
spark.hadoop.hive.metastore.uris           thrift://management:9083

# --- S3A / MinIO ---
spark.hadoop.fs.s3a.endpoint               http://minio-storage:9000
spark.hadoop.fs.s3a.access.key             minioadmin
spark.hadoop.fs.s3a.secret.key             minioadmin123
spark.hadoop.fs.s3a.path.style.access      true
spark.hadoop.fs.s3a.impl                   org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled false

# --- Warehouse ---
spark.sql.warehouse.dir                    s3a://analytics-data/warehouse

# --- Resource defaults (tune as needed) ---
spark.driver.memory                        1g
spark.executor.memory                      1g
